<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pool Room — Walkthrough</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#141417; color:#eee;
         font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:14px 20px 6px; }
  header h1 { font-size:20px; letter-spacing:.3px; }
  header p { color:#9a9aa2; font-size:13px; margin-top:3px; }
  #gallery { display:grid; grid-template-columns:repeat(6,1fr); gap:8px;
             padding:10px 20px 14px; }
  @media (max-width:1100px){ #gallery{ grid-template-columns:repeat(5,1fr);} }
  @media (max-width:700px){ #gallery{ grid-template-columns:repeat(3,1fr);} }
  .card { background:#1d1d22; border:1px solid #2c2c33; border-radius:8px;
          cursor:pointer; overflow:hidden; transition:border-color .15s; }
  .card:hover { border-color:#6cc26c; }
  .card.active { border-color:#8fe08f; box-shadow:0 0 0 1px #8fe08f; }
  .card img { width:100%; display:block; }
  .card .lbl { font-size:12px; padding:5px 7px; color:#d6d6dc;
               white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card .lbl b { color:#8fe08f; }
  .card .lbl a { float:right; color:#9ad0ff; text-decoration:none;
                 font-weight:700; }
  #downloads { padding:0 20px 4px; font-size:13px; color:#bdbdc6; }
  #downloads a { color:#9ad0ff; text-decoration:none; font-weight:600;
                 margin-right:18px; }
  #downloads a:hover { text-decoration:underline; }
  #stage { position:relative; }
  canvas { width:100%; height:min(72vh,760px); display:block;
           background:#0c0c0e; cursor:crosshair; }
  #hud { position:absolute; top:10px; left:14px; pointer-events:none;
         text-shadow:0 1px 3px rgba(0,0,0,.8); }
  #hud .big { font-size:22px; font-weight:700; }
  #hud .sub { font-size:13px; color:#cfcfd6; }
  #hint { position:absolute; bottom:10px; left:14px; font-size:12px;
          color:#bdbdc6; pointer-events:none;
          text-shadow:0 1px 3px rgba(0,0,0,.8); }
  #fade { position:absolute; inset:0; background:#000; opacity:0;
          pointer-events:none; transition:opacity .5s; }
</style>
</head>
<body>
<header>
  <h1>Pool Room — First-Person Walkthrough</h1>
  <p>Auto-tour walks in the Main Entrance, loops each layout, and moves on —
     A through N, forever. Click a card to jump to that layout; click the view
     to take the controls (WASD + mouse, Shift to hurry, Esc to hand back).</p>
</header>
<div id="downloads"></div>
<div id="gallery"></div>
<div id="stage">
  <canvas id="gl"></canvas>
  <div id="hud"><div class="big"></div><div class="sub"></div></div>
  <div id="hint">auto-tour</div>
  <div id="fade"></div>
</div>
<script>
/*__DATA__*/

/* ---------------------------------------------------------- tiny mat4 -- */
function perspective(fov, asp, n, f){
  const t = 1/Math.tan(fov/2), d = 1/(n-f);
  return [t/asp,0,0,0, 0,t,0,0, 0,0,(n+f)*d,-1, 0,0,2*n*f*d,0];
}
function fpsView(px,py,pz,yaw,pitch){
  const cy=Math.cos(yaw), sy=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
  const rx=cy, ry=0, rz=-sy;
  const bx=sy*cp, by=sp, bz=cy*cp;
  const ux=by*rz-bz*ry, uy=bz*rx-bx*rz, uz=bx*ry-by*rx;
  return [rx,ux,bx,0, ry,uy,by,0, rz,uz,bz,0,
          -(rx*px+ry*py+rz*pz), -(ux*px+uy*py+uz*pz), -(bx*px+by*py+bz*pz), 1];
}

/* ------------------------------------------------ procedural textures -- */
function makeTex(gl, draw, size){
  size = size || 256;
  const c = document.createElement('canvas'); c.width = c.height = size;
  const x = c.getContext('2d');
  draw(x, size);
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
  gl.generateMipmap(gl.TEXTURE_2D);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
  return t;
}
function speckle(x, s, n, col, a){
  x.globalAlpha = a;
  for (let i=0;i<n;i++){
    x.fillStyle = col;
    x.fillRect(Math.random()*s, Math.random()*s, 1+Math.random()*2, 1+Math.random()*2);
  }
  x.globalAlpha = 1;
}
const TEXDEFS = {
  /* floor: brown VCT, 2 tiles per texture (world 24" per tile => scale 48) */
  floor: (x,s)=>{
    x.fillStyle = '#a8825c'; x.fillRect(0,0,s,s);
    const t = s/2;
    for (let i=0;i<2;i++) for (let j=0;j<2;j++){
      const v = ((i+j)%2 ? 6 : -5) + (Math.random()*6-3);
      x.fillStyle = `rgb(${168+v},${130+v},${92+v})`;
      x.fillRect(i*t+1, j*t+1, t-2, t-2);
    }
    speckle(x, s, 900, '#7a5c40', .5); speckle(x, s, 500, '#c9a87e', .4);
    x.strokeStyle = 'rgba(88,66,46,.85)'; x.lineWidth = 2;
    x.strokeRect(0,0,s,s); x.beginPath();
    x.moveTo(t,0); x.lineTo(t,s); x.moveTo(0,t); x.lineTo(s,t); x.stroke();
  },
  /* wall: white painted panelling, vertical seams (world 48" per repeat) */
  wall: (x,s)=>{
    x.fillStyle = '#f2f1ee'; x.fillRect(0,0,s,s);
    const g = x.createLinearGradient(0,0,s,0);
    g.addColorStop(0,'rgba(0,0,0,.045)'); g.addColorStop(.08,'rgba(0,0,0,0)');
    g.addColorStop(.92,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.045)');
    x.fillStyle = g; x.fillRect(0,0,s,s);
    x.strokeStyle = 'rgba(150,148,142,.7)'; x.lineWidth = 2;
    x.beginPath(); x.moveTo(1,0); x.lineTo(1,s); x.stroke();
    x.strokeStyle = 'rgba(255,255,255,.6)';
    x.beginPath(); x.moveTo(4,0); x.lineTo(4,s); x.stroke();
    speckle(x, s, 250, '#dddad2', .35);
  },
  /* ceiling: 24x48 acoustic grid (texture = 48x48 world inches) */
  ceil: (x,s)=>{
    x.fillStyle = '#f4f4f5'; x.fillRect(0,0,s,s);
    speckle(x, s, 1400, '#dcdcdf', .5);
    x.strokeStyle = 'rgba(165,165,172,.9)'; x.lineWidth = 2;
    x.strokeRect(0,0,s,s);
    x.beginPath(); x.moveTo(0,s/2); x.lineTo(s,s/2); x.stroke();
  },
  /* felt: tournament blue with cloth noise */
  felt: (x,s)=>{
    x.fillStyle = '#2f8fd0'; x.fillRect(0,0,s,s);
    speckle(x, s, 2200, '#3ba0e2', .35); speckle(x, s, 1600, '#2679b3', .35);
  },
  /* wood: warm grain */
  wood: (x,s)=>{
    x.fillStyle = '#7a4f2a'; x.fillRect(0,0,s,s);
    for (let i=0;i<46;i++){
      const y0 = Math.random()*s;
      x.strokeStyle = `rgba(${60+Math.random()*40},${34+Math.random()*22},${12+Math.random()*12},${.25+Math.random()*.3})`;
      x.lineWidth = .6 + Math.random()*1.8;
      x.beginPath(); x.moveTo(0, y0);
      for (let px=0; px<=s; px+=16)
        x.lineTo(px, y0 + Math.sin(px*.05 + i)*2.2);
      x.stroke();
    }
  },
  /* concrete for steps/landing/HVAC */
  conc: (x,s)=>{
    x.fillStyle = '#9d9da0'; x.fillRect(0,0,s,s);
    speckle(x, s, 2600, '#8a8a8e', .5); speckle(x, s, 1000, '#b2b2b6', .5);
  },
  flat: (x,s)=>{ x.fillStyle = '#fff'; x.fillRect(0,0,s,s); },
};
/* world inches per texture repeat, per material */
const TEXSCALE = { floor:48, wall:96, ceil:48, felt:24, wood:40, conc:36, flat:64 };

/* ------------------------------------------------------------- webgl -- */
const cv = document.getElementById('gl');
const gl = cv.getContext('webgl', {antialias:true});
const VS = `attribute vec3 p; attribute vec3 n; attribute vec3 c; attribute vec2 t;
uniform mat4 proj, view; varying vec3 vc; varying float vd; varying vec2 vt;
void main(){ vec4 vp = view * vec4(p,1.0); gl_Position = proj * vp;
  float sh = 0.60 + 0.40*max(dot(normalize(n), normalize(vec3(0.35,0.9,0.25))),0.0);
  float ao = 0.86 + 0.14*clamp(p.y/1.4, 0.0, 1.0);
  vc = c * sh * ao; vd = length(vp.xyz); vt = t; }`;
const FS = `precision mediump float; varying vec3 vc; varying float vd; varying vec2 vt;
uniform sampler2D tex;
void main(){ vec3 base = texture2D(tex, vt).rgb * vc;
  float fog = smoothstep(9.0, 26.0, vd);
  gl_FragColor = vec4(mix(base, vec3(0.90,0.90,0.92), fog*0.5), 1.0); }`;
function shader(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s);
  gl.compileShader(o); if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))
  throw gl.getShaderInfoLog(o); return o; }
const prog = gl.createProgram();
gl.attachShader(prog, shader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);
const aP=gl.getAttribLocation(prog,'p'), aN=gl.getAttribLocation(prog,'n'),
      aC=gl.getAttribLocation(prog,'c'), aT=gl.getAttribLocation(prog,'t');
const uProj=gl.getUniformLocation(prog,'proj'),
      uView=gl.getUniformLocation(prog,'view');
gl.enable(gl.DEPTH_TEST); gl.enable(gl.CULL_FACE);
gl.cullFace(gl.FRONT);   // v41: world reflection reverses winding
const TEX = {};
for (const k in TEXDEFS) TEX[k] = makeTex(gl, TEXDEFS[k]);

/* ------------------------------------------------- geometry building -- */
const IN = 0.0254;
let buckets = {};                 // mat -> array of floats (p3,n3,c3,t2)
function bkt(mat){ return buckets[mat] || (buckets[mat] = []); }
/* v41 mirror fix: the walkthrough world was the chiral twin of the
   validated Blender renders (room-y mapped straight to GL Z under Y-up
   flips handedness vs Blender's Z-up). Negate Z and normal-z here; the
   reflection reverses winding, so culling switches to FRONT below. */
function pushV(arr, v, nrm, col, u, vv){
  arr.push(v[0]*IN, v[1]*IN, -v[2]*IN, nrm[0],nrm[1],-nrm[2],
           col[0],col[1],col[2], u, vv);
}
function quadM(mat, a,b,c,d, nrm, col){
  const s = TEXSCALE[mat], arr = bkt(mat);
  const ax=Math.abs(nrm[0]), ay=Math.abs(nrm[1]), az=Math.abs(nrm[2]);
  function uv(v){
    if (ay >= ax && ay >= az) return [v[0]/s, v[2]/s];
    if (ax >= az)             return [v[2]/s, v[1]/s];
    return [v[0]/s, v[1]/s];
  }
  const A=uv(a),B=uv(b),C=uv(c),D=uv(d);
  pushV(arr,a,nrm,col,A[0],A[1]); pushV(arr,b,nrm,col,B[0],B[1]);
  pushV(arr,c,nrm,col,C[0],C[1]);
  pushV(arr,a,nrm,col,A[0],A[1]); pushV(arr,c,nrm,col,C[0],C[1]);
  pushV(arr,d,nrm,col,D[0],D[1]);
}
function box(mat, x0,z0,y0, x1,z1,y1, col){
  const A=[x0,y0,z0],B=[x1,y0,z0],C=[x1,y0,z1],D=[x0,y0,z1];
  const E=[x0,y1,z0],F=[x1,y1,z0],G=[x1,y1,z1],H=[x0,y1,z1];
  quadM(mat,E,F,G,H,[0,1,0],col);
  quadM(mat,D,C,B,A,[0,-1,0],col);
  quadM(mat,A,B,F,E,[0,0,-1],col);
  quadM(mat,C,D,H,G,[0,0,1],col);
  quadM(mat,D,A,E,H,[-1,0,0],col);
  quadM(mat,B,C,G,F,[1,0,0],col);
}
function rotBox(mat, cx,cz,y0, w,l,h, yawDeg, col){
  const a = yawDeg*Math.PI/180, ca=Math.cos(a), sa=Math.sin(a);
  const hw=w/2, hl=l/2, y1=y0+h;
  const pt=(dx,dz,y)=>[cx+dx*ca-dz*sa, y, cz+dx*sa+dz*ca];
  const c=[[-hw,-hl],[hw,-hl],[hw,hl],[-hw,hl]];
  const lo=c.map(p=>pt(p[0],p[1],y0)), hi=c.map(p=>pt(p[0],p[1],y1));
  quadM(mat,hi[0],hi[1],hi[2],hi[3],[0,1,0],col);
  quadM(mat,lo[3],lo[2],lo[1],lo[0],[0,-1,0],col);
  for(let i=0;i<4;i++){
    const j=(i+1)%4;
    const mx=(c[i][0]+c[j][0])/2, mz=(c[i][1]+c[j][1])/2;
    const nl=Math.hypot(mx,mz)||1;
    const wn=[(mx*ca-mz*sa)/nl, 0, (mx*sa+mz*ca)/nl];
    quadM(mat,lo[i],lo[j],hi[j],hi[i],wn,col);
  }
}
function cylinder(mat, cx,cz,y0,y1,r0,r1,col,seg){
  seg = seg||16; r1 = (r1===undefined)? r0 : r1;
  for(let i=0;i<seg;i++){
    const a0=i/seg*Math.PI*2, a1=(i+1)/seg*Math.PI*2;
    const q0=[cx+r0*Math.cos(a0), y0, cz+r0*Math.sin(a0)];
    const q1=[cx+r0*Math.cos(a1), y0, cz+r0*Math.sin(a1)];
    const q2=[cx+r1*Math.cos(a1), y1, cz+r1*Math.sin(a1)];
    const q3=[cx+r1*Math.cos(a0), y1, cz+r1*Math.sin(a0)];
    quadM(mat,q0,q1,q2,q3,[Math.cos((a0+a1)/2),0,Math.sin((a0+a1)/2)],col);
    const c0=[cx,y1,cz];
    quadM(mat,c0,q3,q2,c0,[0,1,0],col);
    quadM(mat,c0,q2,q3,c0,[0,1,0],col);
  }
}

const R = DATA.room, W=R.w, L=R.l;
const WALL_H=118;
const WHITE=[1,1,1], DIM=[0.85,0.85,0.85];
function buildScene(lay){
  buckets = {};
  const wl=R.well;
  // ---- shell -------------------------------------------------------------
  box('floor', 0,0,-1, W,wl[1],0, WHITE);
  box('floor', 0,wl[1],-1, wl[0],L,0, WHITE);
  box('conc', wl[0]+22,wl[1],-16, W,L,-15, WHITE);
  box('conc', wl[0]+11,wl[1],-16, wl[0]+22,L,-7.5, WHITE);
  box('conc', wl[0],wl[1],-16, wl[0]+11,L,0, WHITE);
  for (const ry of [wl[1], L-2]){
    box('flat', wl[0],ry,36, W-2,ry+2,39, [0.13,0.13,0.14]);
    for (const px of [wl[0]+1, wl[0]+12, wl[0]+23, W-5])
      box('flat', px,ry,0, px+2,ry+2,36, [0.13,0.13,0.14]);
  }
  box('wall', 0,-6,0, W,0,WALL_H, WHITE);
  box('wall', 0,L,0, W,L+6,WALL_H, WHITE);
  box('wall', -6,0,0, 0,L,WALL_H, WHITE);
  box('wall', W,0,0, W+6,wl[1],WALL_H, WHITE);
  box('wall', W,wl[1],80, W+6,L,WALL_H, WHITE);
  box('flat', W+40,wl[1]-20,-16, W+42,L+20,WALL_H, [0.88,0.87,0.83]);
  box('wood', W-37,L-4.5,-14, W-1,L-2.5,66, WHITE);        // open entry leaf (on landing)
  // doors per the reference video (build DOORS list)
  box('flat', 30,L-2,0, 95,L,80, [0.12,0.12,0.13]);        // EE
  box('flat', W-2,290,0, W,330,80, [0.12,0.12,0.13]);      // kitchen
  box('flat', 276,0,0, 312,2,80, [0.12,0.12,0.13]);        // storage A (N)
  box('flat', W-2,4,0, W,40,80, [0.12,0.12,0.13]);         // storage B (E)
  const hv=R.hvac;
  box('conc', hv[0],hv[1],0, hv[2],hv[3],WALL_H, [0.72,0.72,0.74]);
  box('wood', 0,R.beamY-6,106, W,R.beamY+6,118, [0.55,0.42,0.3]);
  box('flat', 1,1,1, 3,L-1,3, [1,0.22,0.18]);
  box('flat', W-3,1,1, W-1,wl[1],3, [1,0.22,0.18]);
  box('flat', 1,1,1, W-1,3,3, [1,0.22,0.18]);
  box('flat', 1,L-3,1, 260,L-1,3, [1,0.22,0.18]);
  box('flat', 120,L-1,70, 200,L,86, [1,0.42,0.36]);
  box('flat', 0,300,70, 1,380,86, [1,0.42,0.36]);
  box('ceil', 0,0,WALL_H, W,L,WALL_H+2, WHITE);
  for (const p of lay.paths)
    box('flat', p[0],p[1],0.05, p[2],p[3],0.4, [0.62,0.85,0.62]);
  // ---- pool tables: skirt, rails, felt, pockets, tapered legs ------------
  for (const t of lay.tables){
    const [x0,y0v,x1,y1v] = t;
    box('flat', x0+1.5,y0v+1.5,24, x1-1.5,y1v-1.5,30, [0.16,0.16,0.18]); // skirt
    box('felt', x0+6,y0v+6,30, x1-6,y1v-6,31.2, WHITE);                  // felt bed
    const rc=[0.24,0.20,0.17];                                           // rail wood
    box('wood', x0,y0v,30, x1,y0v+6,33, rc);
    box('wood', x0,y1v-6,30, x1,y1v,33, rc);
    box('wood', x0,y0v,30, x0+6,y1v,33, rc);
    box('wood', x1-6,y0v,30, x1,y1v,33, rc);
    const mx=(x0+x1)/2, my=(y0v+y1v)/2;
    const long = (x1-x0) > (y1v-y0v);
    const pockets = [[x0+3,y0v+3],[x1-3,y0v+3],[x0+3,y1v-3],[x1-3,y1v-3]];
    if (long) pockets.push([mx,y0v+3],[mx,y1v-3]);
    else      pockets.push([x0+3,my],[x1-3,my]);
    for (const pk of pockets)
      cylinder('flat', pk[0],pk[1],32.4,33.4,3.4,3.4,[0.05,0.05,0.06],10);
    for (const [lx,ly] of [[x0+7,y0v+7],[x1-7,y0v+7],[x0+7,y1v-7],[x1-7,y1v-7]])
      cylinder('wood', lx,ly,0,24,2.2,3.4,[0.5,0.4,0.32],10);
  }
  // ---- rounds: cloth drape + top + pedestal ------------------------------
  for (const r of lay.rounds){
    cylinder('flat', r[0],r[1],29,30,30,30,[0.95,0.94,0.92]);
    cylinder('flat', r[0],r[1],20,29,27.5,30,[0.90,0.89,0.86]);
    cylinder('conc', r[0],r[1],0,20,2.8,2.8,[0.55,0.55,0.57],8);
    cylinder('conc', r[0],r[1],0,1.2,10,10,[0.5,0.5,0.52],10);
  }
  // ---- chairs -------------------------------------------------------------
  for (const ch of lay.chairs){
    rotBox('flat', ch[0],ch[1],15, 11,12,2.2, ch[2], [0.78,0.36,0.42]);
    const a=ch[2]*Math.PI/180;
    for (const [dx,dz] of [[-4.2,-4.6],[4.2,-4.6],[-4.2,4.6],[4.2,4.6]]){
      const lx = ch[0] + dx*Math.cos(a)-dz*Math.sin(a);
      const lz = ch[1] + dx*Math.sin(a)+dz*Math.cos(a);
      box('flat', lx-0.7,lz-0.7,0, lx+0.7,lz+0.7,15, [0.35,0.28,0.24]);
    }
    rotBox('flat', ch[0]-Math.sin(a)*-5.2, ch[1]+Math.cos(a)*5.2, 15,
           11,1.6,19, ch[2], [0.78,0.36,0.42]);
  }
  // ---- bar tops + stools --------------------------------------------------
  for (const tp of lay.tops){
    const ns = tp[2];
    if (ns) box('wood', tp[0]-14,tp[1]-11,39, tp[0]+14,tp[1]+11,40.8, WHITE);
    else    box('wood', tp[0]-11,tp[1]-14,39, tp[0]+11,tp[1]+14,40.8, WHITE);
    cylinder('flat', tp[0],tp[1],0,39,1.8,1.8,[0.15,0.15,0.16],8);
    cylinder('flat', tp[0],tp[1],0,1.2,8,8,[0.15,0.15,0.16],10);
    const st = ns ? [[tp[0]-16,tp[1]],[tp[0]+16,tp[1]]]
                  : [[tp[0],tp[1]-16],[tp[0],tp[1]+16]];
    for (const s of st){
      cylinder('wood', s[0],s[1],26,28,7,7,WHITE,10);
      cylinder('flat', s[0],s[1],0,26,1.4,1.4,[0.15,0.15,0.16],8);
      cylinder('flat', s[0],s[1],0,1,6,6,[0.15,0.15,0.16],8);
    }
  }
  // upload buckets
  const out = {};
  for (const mat in buckets){
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(buckets[mat]), gl.STATIC_DRAW);
    out[mat] = { buf, n: buckets[mat].length/11 };
  }
  return out;
}

/* -------------------------------------------------------------- state -- */
let cur = 0, scene = {};
// v58: walk with purpose — 5.5ft eye, gaze tilted ~16 deg down
const TOUR_PITCH = 0.28;
let cam = {x:348, y:646, yaw:Math.PI/2, pitch:TOUR_PITCH};
let manual = false, tourIdx = 0, tourT = 0;
const keys = {};
const fadeEl = document.getElementById('fade');
const hudBig = document.querySelector('#hud .big');
const hudSub = document.querySelector('#hud .sub');
const hintEl = document.getElementById('hint');

function floorAt(x,y){
  const wl=R.well;
  if (x>W) return -15;
  if (x>wl[0]+22 && y>wl[1]) return -15;
  if (x>wl[0]+11 && y>wl[1]) return -7.5;
  return 0;
}
function eyeY(x,y){ return floorAt(x,y) + 66; }   // 5.5 ft

function loadLayout(i, spawnOutside){
  cur = ((i % DATA.layouts.length) + DATA.layouts.length) % DATA.layouts.length;
  const lay = DATA.layouts[cur];
  scene = buildScene(lay);
  tourIdx = 0; tourT = 0;
  if (spawnOutside){ cam.x = lay.tour[0][0]; cam.y = lay.tour[0][1];
                     cam.yaw = Math.PI/2; cam.pitch = TOUR_PITCH; }
  hudBig.textContent = lay.letter + ". " + lay.short;
  hudSub.textContent = lay.name;
  document.querySelectorAll('.card').forEach((c,j)=>
    c.classList.toggle('active', j===cur));
}

/* --------------------------------------------------------------- tour -- */
const SPEED = 62;
function stepTour(dt){
  const lay = DATA.layouts[cur], T = lay.tour;
  if (tourIdx >= T.length-1){
    fadeEl.style.opacity = 1;
    setTimeout(()=>{ loadLayout(cur+1, true);
                     fadeEl.style.opacity = 0; }, 550);
    tourIdx = -1;
    return;
  }
  if (tourIdx < 0) return;
  const a = T[tourIdx], b = T[tourIdx+1];
  const seg = Math.hypot(b[0]-a[0], b[1]-a[1]) || 1;
  tourT += SPEED*dt/seg;
  if (tourT >= 1){ tourIdx++; tourT = 0; return; }
  cam.x = a[0] + (b[0]-a[0])*tourT;
  cam.y = a[1] + (b[1]-a[1])*tourT;
  let lx = b[0], ly = b[1];
  if (tourIdx+2 < T.length && tourT > 0.6){
    lx = (b[0]+T[tourIdx+2][0])/2; ly = (b[1]+T[tourIdx+2][1])/2; }
  const want = Math.atan2(-(lx-cam.x), -(ly-cam.y));
  let d = want - cam.yaw;
  while (d >  Math.PI) d -= 2*Math.PI;
  while (d < -Math.PI) d += 2*Math.PI;
  cam.yaw += d * Math.min(1, dt*2.4);
  cam.pitch += (TOUR_PITCH - cam.pitch) * Math.min(1, dt*2);
}

/* ------------------------------------------------------------- manual -- */
function collide(nx, ny){
  const r = 9, lay = DATA.layouts[cur], wl=R.well;
  if (nx < r) nx = r;
  if (ny < r) ny = r;
  if (ny > L - r) ny = L - r;
  if (nx > W - r && !(ny > wl[1]+6 && ny < L-6)) nx = W - r;
  if (nx > W + 30) nx = W + 30;
  // v59: treat every obstacle as an AABB grown by the body radius; if the
  // player centre lands inside it (edge OR deep interior), eject along the
  // shallowest axis. The old nearest-point test returned distance 0 for
  // interior points, so you could stand on / walk through a table.
  for (const o of lay.obstacles){
    const x0=o[0]-r, y0=o[1]-r, x1=o[2]+r, y1=o[3]+r;
    if (nx > x0 && nx < x1 && ny > y0 && ny < y1){
      const pL = nx-x0, pR = x1-nx, pD = ny-y0, pU = y1-ny;
      const m = Math.min(pL, pR, pD, pU);
      if (m === pL) nx = x0; else if (m === pR) nx = x1;
      else if (m === pD) ny = y0; else ny = y1;
    }
  }
  return [nx, ny];
}
function stepManual(dt){
  const sp = (keys['ShiftLeft']||keys['ShiftRight']) ? 140 : 70;
  let fx = -Math.sin(cam.yaw), fy = -Math.cos(cam.yaw);
  // v41: screen-right in the mirrored world
  let rx = -Math.cos(cam.yaw), ry = Math.sin(cam.yaw);
  let mx = 0, my = 0;
  if (keys['KeyW']||keys['ArrowUp'])    { mx += fx; my += fy; }
  if (keys['KeyS']||keys['ArrowDown'])  { mx -= fx; my -= fy; }
  if (keys['KeyD']||keys['ArrowRight']) { mx += rx; my += ry; }
  if (keys['KeyA']||keys['ArrowLeft'])  { mx -= rx; my -= ry; }
  const m = Math.hypot(mx,my);
  if (m > 0){
    const [nx, ny] = collide(cam.x + mx/m*sp*dt, cam.y + my/m*sp*dt);
    cam.x = nx; cam.y = ny;
  }
}

/* -------------------------------------------------------------- input -- */
window.addEventListener('keydown', e=>{ keys[e.code]=true;
  if (e.code==='KeyT' && manual) document.exitPointerLock(); });
window.addEventListener('keyup', e=>{ keys[e.code]=false; });
cv.addEventListener('click', ()=>{ if (!manual) cv.requestPointerLock(); });
document.addEventListener('pointerlockchange', ()=>{
  manual = (document.pointerLockElement === cv);
  hintEl.textContent = manual
    ? 'manual — WASD move · mouse look · Shift hurry · Esc = auto-tour'
    : 'auto-tour — click the view to walk yourself';
  if (!manual){
    const T = DATA.layouts[cur].tour;
    let bi = 0, bd = 1e18;
    for (let i=0;i<T.length;i++){
      const d = (T[i][0]-cam.x)**2 + (T[i][1]-cam.y)**2;
      if (d < bd){ bd = d; bi = i; }
    }
    tourIdx = Math.min(bi, T.length-2); tourT = 0;
  }
});
document.addEventListener('mousemove', e=>{
  if (!manual) return;
  cam.yaw   += e.movementX * 0.0026;   // v41: sign flips with the mirror
  cam.pitch -= e.movementY * 0.0026;
  cam.pitch = Math.max(-1.2, Math.min(1.2, cam.pitch));
});

/* ------------------------------------------------------------ gallery -- */
const gal = document.getElementById('gallery');
DATA.layouts.forEach((lay, i)=>{
  const d = document.createElement('div');
  d.className = 'card';
  const fname = `${lay.letter}_${lay.short.replace(/[^a-z0-9]+/gi,'_')}_overhead.jpg`;
  d.innerHTML = `<img src="${lay.img}" alt="">
    <div class="lbl"><b>${lay.letter}.</b> ${lay.short}
    <a href="${lay.img}" download="${fname}" title="download this overhead view">⤓</a></div>`;
  d.title = lay.name;
  d.onclick = ()=>{ if (manual) document.exitPointerLock();
                    loadLayout(i, true); };
  d.querySelector('a').onclick = (e)=> e.stopPropagation();
  gal.appendChild(d);
});
// v42: embedded downloads — the page is self-contained, so the PDFs and
// each overhead image download straight from it (no repo access needed)
const dls = DATA.downloads || {};
const lnk = DATA.links || {};
const dlBar = document.getElementById('downloads');
let dlHtml = 'Downloads &amp; links: ';
if (dls.options_pdf) dlHtml +=
  `<a href="${dls.options_pdf}" download="pool_room_options.pdf">⤓ Options PDF (12 pages)</a>`;
if (dls.sheet_pdf) dlHtml +=
  `<a href="${dls.sheet_pdf}" download="pool_room_topdowns.pdf">⤓ One-page top-down sheet</a>`;
if (lnk.deck) dlHtml +=
  `<a href="${lnk.deck}" target="_blank" rel="noopener">⚖ Weigh the options — interactive decision deck</a>`;
if (lnk.download) dlHtml +=
  `<a href="${lnk.download}" target="_blank" rel="noopener">🔗 shareable download page</a>`;
dlHtml += '<span style="color:#77777f">each layout card also has its own ⤓</span>';
dlBar.innerHTML = dlHtml;

/* --------------------------------------------------------------- loop -- */
const stride = 11*4;
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  if (manual) stepManual(dt); else stepTour(dt);
  const wpx = cv.clientWidth, hpx = cv.clientHeight;
  if (cv.width !== wpx*devicePixelRatio|0 || cv.height !== hpx*devicePixelRatio|0){
    cv.width = wpx*devicePixelRatio; cv.height = hpx*devicePixelRatio;
  }
  gl.viewport(0,0,cv.width,cv.height);
  gl.clearColor(0.90,0.90,0.92,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.uniformMatrix4fv(uProj,false,new Float32Array(
    perspective(1.15, cv.width/cv.height, 0.06, 40)));
  gl.uniformMatrix4fv(uView,false,new Float32Array(
    fpsView(cam.x*IN, eyeY(cam.x,cam.y)*IN, -cam.y*IN,
            Math.PI - cam.yaw, cam.pitch)));
  for (const mat in scene){
    gl.bindTexture(gl.TEXTURE_2D, TEX[mat]);
    gl.bindBuffer(gl.ARRAY_BUFFER, scene[mat].buf);
    gl.vertexAttribPointer(aP,3,gl.FLOAT,false,stride,0);  gl.enableVertexAttribArray(aP);
    gl.vertexAttribPointer(aN,3,gl.FLOAT,false,stride,12); gl.enableVertexAttribArray(aN);
    gl.vertexAttribPointer(aC,3,gl.FLOAT,false,stride,24); gl.enableVertexAttribArray(aC);
    gl.vertexAttribPointer(aT,2,gl.FLOAT,false,stride,36); gl.enableVertexAttribArray(aT);
    gl.drawArrays(gl.TRIANGLES, 0, scene[mat].n);
  }
  requestAnimationFrame(frame);
}
loadLayout(0, true);
if (location.hash.startsWith('#cam=')){
  const v = location.hash.slice(5).split(',').map(Number);
  if (v.length >= 4) loadLayout(v[3]|0, false);
  cam.x = v[0]; cam.y = v[1]; cam.yaw = (v[2]||0)*Math.PI/180;
  tourIdx = -1;
}
requestAnimationFrame(frame);
</script>
</body>
</html>
